<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lg-fb-comment-box.css" />
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lg-transitions.css" />
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lightgallery.css" />
</head>

<body>
    <div id="animated-thumbnails-gallery" class="gallery-container">
        <a class="gallery-item" href="res/d01/IPZ-339[01]-0001.png">
            <img class="img-responsive" src="res/d01/IPZ-339[01]-0001.png" />
        </a>
        <a class="gallery-item" href="res/d01/IPZ-339[01]-0002.png">
            <img class="img-responsive" src="res/d01/IPZ-339[01]-0002.png" />
        </a>
        <a class="gallery-item" href="res/d01/IPZ-339[01]-0003.png">
            <img class="img-responsive" src="res/d01/IPZ-339[01]-0003.png" />
        </a>
    </div>

    <script src="lib/jquery/jquery.min.js"></script>
    <script src="lib/lightgallery/js/lightgallery.min.js"></script>
    <script src="lib/lightgallery/js/lg-zoom.min.js"></script>
    <script type="text/javascript">

        // https://341776236.github.io/
        $.getJSON("/data/star/d01.json", function (data) {

            let gallery_id = document.getElementById('animated-thumbnails-gallery');

            data.forEach(v => { // 作品
                let arr = [];

                v.part.forEach(p => { // 作品章节

                    p.image.map(img =>  // 章节图片
                        `<a class="gallery-item" href="res/d01/${img}"> <img class="img-responsive" src="res/d01/${img}" /> </a>`
                    ).forEach(i => arr.push(i));

                });

                document.getElementById('animated-thumbnails-gallery').innerHTML = arr.reduce((i, j) => i + j);
            });


            lightGallery(document.getElementById('animated-thumbnails-gallery'), {
                thumbnail: true,
            });
        });

    </script>
</body>

</html>
