    <script type="text/javascript">

        $.getJSON("https://341776236.github.io/data/star/d01.json", function (data) {

            let arr = [];
            data.forEach(v => { // 作品
                v.part.forEach(p => { // 作品章节
                    p.image.map(img => {
                        return {
                            src: `res/d01/${img}`,
                            thumb: `res/d01/${img}`,
                            subHtml: `<div class="lightGallery-captions"> <h4>${v.name}</h4> <p>${v.code}[${p.length}]</p> </div>`
                        };
                    }).forEach(i => arr.push(i));
                });

            });

            const lgContainer = document.getElementById('inline-gallery-container');
            const inlineGallery = lightGallery(lgContainer, {
                container: lgContainer,
                dynamic: true,
                hash: false,
                closable: false,
                showMaximizeIcon: true,
                appendSubHtmlTo: '.lg-item',
                slideDelay: 400,
                dynamicEl: arr
            });

            inlineGallery.openGallery();

        });

    </script>
</body>
