<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显示</title>
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lg-fb-comment-box.css" />
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lg-transitions.css" />
    <link type="text/css" rel="stylesheet" href="lib/lightgallery/css/lightgallery.css" />
</head>

<body>

    <div id="inline-gallery-container" class="inline-gallery-container"></div>

    <script src="lib/jquery/jquery.min.js"></script>
    <script src="lib/lightgallery/js/lightgallery.min.js"></script>
    <script src="lib/lightgallery/js/lg-zoom.min.js"></script>
    <script src="lib/lightgallery/js/lg-thumbnail.min.js"></script>
    <script src="lib/lightgallery/js/lg-pager.min.js"></script>
    <script src="lib/lightgallery/js/lg-autoplay.min.js"></script>
    <script src="lib/lightgallery/js/lg-fullscreen.min.js"></script>
    <script src="lib/lightgallery/js/lg-hash.min.js"></script>
    <script src="lib/lightgallery/js/lg-share.min.js"></script>

    <script type="text/javascript">

        let star = "d03";
        $.getJSON(`https://341776236.github.io/data/star/${star}.json`, function (data) {

            let arr = [];
            data.forEach(v => { // 作品
                v.part.forEach(p => { // 作品章节
                    p.image.map(img => {
                        return {
                            src: `res/${star}/${img}`,
                            thumb: `res/${star}/${img}`,
                            subHtml: `<div class="lightGallery-captions"> <h4>${v.name}</h4> <p>${v.code}[${p.name}][${p.length}]</p> </div>`
                        };
                    }).forEach(i => arr.push(i));
                });

            });

            const lgContainer = document.getElementById('inline-gallery-container');
            const inlineGallery = lightGallery(lgContainer, {
                container: lgContainer,
                dynamic: true,
                hash: false,
                closable: false,
                showMaximizeIcon: true,
                appendSubHtmlTo: '.lg-item',
                slideDelay: 400,
                dynamicEl: arr
            });

            inlineGallery.openGallery();

        });

    </script>
</body>

</html>
