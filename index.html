<!doctype html>
<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width initial-scale=1'>
    <link href='https://fonts.loli.net/css?family=Open+Sans:400italic,700italic,700,400&subset=latin,latin-ext'
        rel='stylesheet' type='text/css' />
    <link rel="stylesheet" href="/css/style.css">
    <title>花名册</title>
</head>

<body class='typora-export'>
    <div class='typora-export-content'>
        <div id='write' class=''>
            <h1 id='命名规则'><span>命名规则</span></h1>
            <ul>
                <li><span>影片: 女优.厂商.code.字幕.码.part </span><br />
                    <span>例子: A-01.01.404.01.01.01, A-01.01.404.01.01._</span>
                </li>
                <li>
                    <span>花絮: 女优.厂商.code._</span><br />
                    <span>例子: B-11.14.176._</span>
                </li>
            </ul>
            
            <h2 id='厂商映射'><span>厂商映射</span></h2>
            <figure>
                <table>
                    <thead>
                        <tr>
                            <th style='text-align:center;'><span>厂商</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                            <th style='text-align:center;'><span>厂商</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                            <th style='text-align:center;'><span>厂商</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                        </tr>
                    </thead>
                    <tbody id="manufacturer_tbody"></tbody>
                </table>
            </figure>
            <h2 id='人物映射关系'><span>人物映射</span></h2>
            <figure>
                <table>
                    <thead>
                        <tr>
                            <th style='text-align:center;'><span>姓名</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                            <th style='text-align:center;'><span>身高</span></th>
                            <th style='text-align:center;'><span>三围(胸腰臀)</span></th>
                            <th style='text-align:center;'><span>罩杯</span></th>
                        </tr>
                    </thead>
                    <tbody id="actress_tbody"></tbody>
                </table>
            </figure>
        </div>
    </div>

    <script src="lib/jquery/jquery.min.js"></script>
    <script type="text/javascript">

        const base_url = "https://341776236.github.io";

        // 人物映射
        function renderActress(data){
            let actress_tbody = document.getElementById('actress_tbody');
            actress_tbody.innerHTML = data.map(item => `
                        <tr>
                            <td style='text-align:center;'>
                                <a target="_blank" href='${base_url}/demo.html?star=${item.code.toLocaleLowerCase().replace('-','')}'>
                                    <span>${item.name}</span>
                                </a>
                            </td>
                            <td style='text-align:center;'><span>${item.code}</span></td>
                            <td style='text-align:center;'><span>${item.height}cm</span></td>
                            <td style='text-align:center;'><span>${item.measurements}</span></td>
                            <td style='text-align:center;'><span>${item.cup}</span></td>
                        </tr>
            `).reduce((previous, current) => previous + current);
        }
        // <a href=${base_url}/demo.html?star=${item.code.toLocaleLowerCase().replace('-','')}><span>${item.name}</span></a>

        // 厂商映射
        function renderManufacturer(data){
            let manufacturer_tbody = document.getElementById('manufacturer_tbody');
            manufacturer_tbody.innerHTML = data.map(item => `
                        <td style='text-align:center;'><span>${item.name}</span></td>
                        <td style='text-align:center;'><span>${item.code}</span></td>
            `).map((item, index) => index % 3 == 0 ? "<tr>" + item : index % 3 == 2 ? item + "</tr>" : item)
                .reduce((previous, current) => previous + current);            
        }

        
        // 网络请求
        $.getJSON(`${base_url}/data/actress.json`, data => renderActress(data));
        $.getJSON(`${base_url}/data/manufacturer.json`, data => renderManufacturer(data));

    </script>

</body>

</html>
