<!doctype html>
<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width initial-scale=1'>
    <link href='https://fonts.loli.net/css?family=Open+Sans:400italic,700italic,700,400&subset=latin,latin-ext'
        rel='stylesheet' type='text/css' />
    <link rel="stylesheet" href="/css/style.css">
    <title>花名册</title>
</head>

<body class='typora-export'>
    <div class='typora-export-content'>
        <div id='write' class=''>
            <h1 id='命名规则'><span>命名规则</span></h1>
            <ul>
                <li><span>影片: 女优.厂商.code.字幕.码.part </span><br /><span>例子: A-01.01.404.01.01.01,
                        A-01.01.404.01.01._</span></li>
                <li><span>花絮: 女优.厂商.code._</span>
                    <span>例子: B-11.14.176._</span>
                </li>
            </ul>
            <h1 id='映射关系'><span>映射关系</span></h1>
            <figure>
                <table>
                    <thead>
                        <tr>
                            <th><span>字幕</span></th>
                            <th style='text-align:right;'><span>无码</span></th>
                            <th style='text-align:center;'><span>part(位置/全/末尾)</span></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span>1/0</span></td>
                            <td style='text-align:right;'><span>0/1</span></td>
                            <td style='text-align:center;'><span>1,2.../00/_</span></td>
                        </tr>
                    </tbody>
                </table>
            </figure>
            <p>&nbsp;</p>

            <figure>

                            <th style='text-align:center;'><span>厂商</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                            <th style='text-align:center;'><span>厂商</span></th>
                            <th style='text-align:center;'><span>code</span></th>
                        </tr>
                    </thead>
                    <tbody id="manufacturer_tbody">
                        <tr>
                            <td><span>ABP</span></td>
                            <td style='text-align:right;'><span>01</span></td>
                            <td style='text-align:center;'><span>IPX</span></td>
                            <td style='text-align:center;'><span>02</span></td>
                            <td style='text-align:center;'><span>STARS</span></td>
                            <td style='text-align:center;'><span>03</span></td>
                        </tr>
                        <tr>
                            <td><span>EBOD</span></td>
                            <td style='text-align:right;'><span>04</span></td>
                            <td style='text-align:center;'><span>CAWD</span></td>
                            <td style='text-align:center;'><span>05</span></td>
                            <td style='text-align:center;'><span>SSNI</span></td>
                            <td style='text-align:center;'><span>06</span></td>
                        </tr>
                        <tr>
                            <td><span>FSDSS</span></td>
                            <td style='text-align:right;'><span>07</span></td>
                            <td style='text-align:center;'><span>MIDE</span></td>
                            <td style='text-align:center;'><span>08</span></td>
                            <td style='text-align:center;'><span>SHKD</span></td>
                            <td style='text-align:center;'><span>09</span></td>
                        </tr>
                        <tr>
                            <td><span>IPZ</span></td>
                            <td style='text-align:right;'><span>10</span></td>
                            <td style='text-align:center;'><span>STAR</span></td>
                            <td style='text-align:center;'><span>11</span></td>
                            <td style='text-align:center;'><span>AVZG</span></td>
                            <td style='text-align:center;'><span>12</span></td>
                        </tr>
                        <tr>
                            <td><span>AQMB</span></td>
                            <td style='text-align:right;'><span>13</span></td>

                            <td style='text-align:center;'><span>14</span></td>
                            <td style='text-align:center;'><span>ATID</span></td>
                            <td style='text-align:center;'><span>15</span></td>
                        </tr>
                        <tr>
                            <td><span>RBD</span></td>
                            <td style='text-align:right;'><span>14</span></td>

                        </tr>
                        <tr>
                            <td><span>MEYD</span></td>

            </figure>
            <h2 id='人物映射关系'><span>人物映射关系</span></h2>
            <figure>
                <table>
                    <thead>
                        <tr>
                            <th><span>姓名</span></th>
                            <th style='text-align:right;'><span>code</span></th>
                            <th style='text-align:center;'><span>身高</span></th>
                            <th style='text-align:center;'><span>三围(胸腰臀)</span></th>
                            <th style='text-align:center;'><span>罩杯</span></th>
                        </tr>
                    </thead>
                    <tbody id="actress_tbody"></tbody>
                </table>
            </figure>
        </div>
    </div>

    <script src="lib/jquery/jquery.min.js"></script>
    <script type="text/javascript">

        const base_url = "https://341776236.github.io";

        $.getJSON(`${base_url}/data/actress.json`, function (data) {

            let actress_tbody = document.getElementById('actress_tbody');

            actress_tbody.innerHTML = data.map(item => `
                        <tr>
                            <td><span>${item.name}</span></td>
                            <td style='text-align:right;'><span>${item.code}</span></td>
                            <td style='text-align:center;'><span>${item.height}cm</span></td>
                            <td style='text-align:center;'><span>${item.measurements}</span></td>
                            <td style='text-align:center;'><span>${item.cup}</span></td>
                        </tr>
            `).reduce((previous, current) => previous + current);

        });

    </script>

</body>

</html>
